baseURL = "https://tomwilliams.cloud/"
languageCode = "en-gb"
title = "Tom Williams | Senior Cloud Engineer"
# Use our own layouts (no external theme)
[params]
  description = "Senior Cloud Engineer specialising in AWS, Terraform, and infrastructure automation. AWS-certified (5x), based in the UK and open to new opportunities."
  author = "Tom Williams"
  github = "https://github.com/TomWilliams-12"
  linkedin = "https://linkedin.com/in/tom-williams-9aa344106/"
  email = "williams.t17@gmail.com"
  domain = "tomwilliams.cloud"
  # Used in hero + meta to signal availability and location to recruiters
  location = "United Kingdom · Remote / Hybrid"
  availability = "Open to new opportunities"
  # Social share image (1200x630) used for Open Graph / Twitter cards
  ogImage = "images/og-image.png"
  # CV/résumé: drop your PDF at static/cv.pdf, then set resumeReady = true to
  # reveal the "Download CV" buttons site-wide. Kept false so the live site
  # never shows a broken link before the file exists.
  resume = "/cv.pdf"
  resumeReady = false

[params.contact]
  formspree = "https://formspree.io/f/mzdjapvw"

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 1
  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 2
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 3
  [[menu.main]]
    name = "Contact"
    url = "/#contact"
    weight = 4

[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
    lineNos = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

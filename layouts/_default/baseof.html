<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  {{- partial "seo.html" . -}}
  <link rel="stylesheet" href="/css/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4N93L1L704"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-4N93L1L704');
  </script>
</head>
<body>

  {{- partial "nav.html" . -}}

  <main>
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . -}}

  <script>
    // Mobile nav toggle
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.querySelector('.nav-toggle');
      const menu = document.querySelector('.site-nav ul');
      if (toggle && menu) {
        toggle.addEventListener('click', () => {
          const open = menu.classList.toggle('open');
          toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      }

      // Contact form AJAX submission
      const form = document.getElementById('contact-form');
      const status = document.getElementById('form-status');
      if (form && status) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const btn = form.querySelector('button[type="submit"]');
          btn.disabled = true;
          btn.textContent = 'Sending...';

          fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
          }).then((res) => {
            if (res.ok) {
              form.style.display = 'none';
              status.style.display = 'block';
              status.className = 'form-status form-success';
              status.textContent = 'Thanks for your message! I\'ll get back to you soon.';
            } else {
              status.style.display = 'block';
              status.className = 'form-status form-error';
              status.textContent = 'Something went wrong. Please try again.';
              btn.disabled = false;
              btn.textContent = 'Send Message →';
            }
          }).catch(() => {
            status.style.display = 'block';
            status.className = 'form-status form-error';
            status.textContent = 'Something went wrong. Please try again.';
            btn.disabled = false;
            btn.textContent = 'Send Message →';
          });
        });
      }

      // Theme toggle
      const root = document.documentElement;
      const setTheme = (t) => {
        root.setAttribute('data-theme', t);
        try { localStorage.setItem('theme', t); } catch (e) {}
        document.querySelectorAll('.theme-toggle button').forEach((b) => {
          const on = b.dataset.themeSet === t;
          b.classList.toggle('on', on);
          b.setAttribute('aria-pressed', on ? 'true' : 'false');
        });
      };
      document.querySelectorAll('.theme-toggle button').forEach((b) => {
        b.addEventListener('click', () => setTheme(b.dataset.themeSet));
      });
      // sync initial button state with the theme set by the head bootstrap
      setTheme(root.getAttribute('data-theme') || 'dark');
    });
  </script>
</body>
</html>

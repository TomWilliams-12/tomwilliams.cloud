{{ define "main" }}
<section style="padding-top:130px;">
  <div class="container">
    <div class="section-head">
      <div>
        <div class="section-kicker">{{ if eq .Kind "term" }}tagged{{ else }}index{{ end }}</div>
        <h2 class="section-title">{{ .Title }}</h2>
      </div>
    </div>
    <div class="blog-list">
      {{ range .Pages.ByDate.Reverse }}
      <div class="blog-row">
        <span class="blog-date">{{ .Date.Format "2 Jan 2006" }}</span>
        <div class="blog-main">
          <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
          {{ with .Summary }}<p>{{ . }}</p>{{ end }}
          {{ with .Params.tags }}<div>{{ range . }}<a class="blog-tag" href="/tags/{{ . | urlize }}/">{{ . }}</a>{{ end }}</div>{{ end }}
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}

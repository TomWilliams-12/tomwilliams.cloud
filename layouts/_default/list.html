{{ define "main" }}
<section style="padding-top: 8rem;">
  <div class="container">
    <h2 class="section-title">{{ .Title }}</h2>
    <div class="blog-grid">
      {{ range .Pages.ByDate.Reverse }}
      <div class="blog-card">
        <div class="blog-date">{{ .Date.Format "2 Jan 2006" }}</div>
        <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
        <p>{{ .Summary }}</p>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}

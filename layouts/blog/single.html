{{ define "main" }}
<article>
  <header class="post-header">
    <div class="container">
      <span class="post-date">{{ .Date.Format "2 January 2006" }}</span>
      <h1>{{ .Title }}</h1>
      {{ with .Params.summary }}<p class="post-summary">{{ . }}</p>{{ end }}
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
